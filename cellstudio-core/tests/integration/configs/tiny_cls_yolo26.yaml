_base_:
- base_tiny_runtime.yaml
task:
  type: ClassificationTask
model:
  type: UltralyticsClsAdapter
  yaml_model: yolov8n-cls.yaml
  num_classes: 2
train_dataloader:
  batch_size: 2
  num_workers: 0
  dataset: &id001
    type: UDFDataset
    data_root: datasets/classfication/MIDOG_tiny
    ann_file: udf_train.json
    task_filter: image
    pipeline:
    - type: LoadImageFromFile
    - type: Resize
      size:
      - 224
      - 224
    - type: Normalize
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
    - type: PackCellStudioInputs
val_dataloader:
  batch_size: 2
  num_workers: 0
  dataset: *id001
val_evaluator:
  metrics:
  - type: Accuracy
  - type: Precision
  - type: Recall
  - type: F1_Score
optim_wrapper:
  optimizer:
    type: AdamW
    lr: 0.001

