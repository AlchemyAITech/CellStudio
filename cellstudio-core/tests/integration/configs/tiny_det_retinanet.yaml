_base_:
- base_tiny_runtime.yaml
task:
  type: ObjectDetectionTask
model:
  type: MMDetAdapter
  config_file: configs/detect/mmdet_configs/rtmdet_m_8xb32-300e_coco.py
  pretrained: ''
  num_classes: 2
train_dataloader:
  batch_size: 2
  num_workers: 0
  dataset: &id001
    type: UDFDataset
    data_root: datasets/detection/MIDO_tiny
    ann_file: udf_standard.json
    task_filter: detection
    pipeline:
    - type: LoadImageFromFile
    - type: Resize
      size:
      - 640
      - 640
    - type: Normalize
      mean:
      - 0
      - 0
      - 0
      std:
      - 255.0
      - 255.0
      - 255.0
    - type: PackCellStudioInputs
val_dataloader:
  batch_size: 2
  num_workers: 0
  dataset: *id001
val_evaluator:
  metrics:
  - type: det_map50
  - type: det_precision
  - type: det_recall
  - type: det_f1
  - type: det_count_error
optim_wrapper:
  optimizer:
    type: AdamW
    lr: 0.001

