_base_:
- base_tiny_runtime.yaml
model:
  architecture: resnet50
  loss:
    class_weights:
    - 1.0
    - 1.0
    type: CrossEntropyLoss
  num_classes: 2
  pretrained: true
  type: TimmClassifier
optim_wrapper:
  optimizer:
    lr: 0.0001
    type: AdamW
runner:
  max_epochs: 5
  type: EpochBasedRunner
task:
  type: ClassificationTask
train_dataloader:
  batch_size: 4
  dataset:
    ann_file: splits/train.json
    data_root: datasets/classfication/MIDOG_tiny
    pipeline:
    - type: LoadImageFromFile
    - size:
      - 224
      - 224
      type: Resize
    - mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      type: Normalize
    - keys:
      - img
      type: PackCellStudioInputs
    type: StandardClassificationDataset
  num_workers: 4
val_dataloader:
  batch_size: 4
  dataset:
    ann_file: splits/val.json
    data_root: datasets/classfication/MIDOG_tiny
    pipeline:
    - type: LoadImageFromFile
    - size:
      - 224
      - 224
      type: Resize
    - mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      type: Normalize
    - keys:
      - img
      type: PackCellStudioInputs
    type: StandardClassificationDataset
  num_workers: 4
