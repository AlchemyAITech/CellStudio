_base_:
  - base_tiny_runtime.yaml

task:
  type: ClassificationTask

model:
  type: UltralyticsClsAdapter
  yaml_model: yolov8n-cls.pt
  loss:
    type: CrossEntropyLoss
    class_weights: [1.0, 1.0]
  num_classes: 2

train_dataloader:
  batch_size: 4
  num_workers: 0
  dataset:
    type: UDFDataset
    data_root: datasets/classfication/MIDOG_tiny
    ann_file: udf_train.json
    pipeline:
      - type: LoadImageFromFile
      - type: Resize
        size: [224, 224]
      - type: Normalize
        mean: [0.0, 0.0, 0.0]
        std: [255.0, 255.0, 255.0]
      - type: PackCellStudioInputs
        

val_dataloader:
  batch_size: 4
  num_workers: 0
  dataset:
    type: UDFDataset
    data_root: datasets/classfication/MIDOG_tiny
    ann_file: udf_val.json
    pipeline:
      - type: LoadImageFromFile
      - type: Resize
        size: [224, 224]
      - type: Normalize
        mean: [0.0, 0.0, 0.0]
        std: [255.0, 255.0, 255.0]
      - type: PackCellStudioInputs
        

optim_wrapper:
  optimizer:
    type: AdamW
    lr: 0.001

