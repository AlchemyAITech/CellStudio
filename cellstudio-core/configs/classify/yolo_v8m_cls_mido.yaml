_base_:
  - ../_base_/default_runtime.yaml

task:
  type: ClassificationTask

model:
  type: UltralyticsClsAdapter
  yaml_model: yolov8m-cls.pt
  loss:
    type: CrossEntropyLoss
    class_weights: [1.0, 1.0]
  num_classes: 2

train_dataloader:
  batch_size: 128
  num_workers: 4
  dataset:
    type: StandardClassificationDataset
    data_root: datasets/classfication/MIDOG
    ann_file: standardized/mido_cls_train.json
    pipeline:
      - type: LoadImageFromFile
      - type: MacenkoNormalize
      - type: Resize
        size: [224, 224]
      - type: RandomFlip
        prob: 0.5
        direction: 'horizontal'
      - type: RandomFlip
        prob: 0.5
        direction: 'vertical'
      - type: ColorJitter
        brightness: 0.2
        contrast: 0.2
      - type: Normalize
        mean: [0.0, 0.0, 0.0]
        std: [255.0, 255.0, 255.0]
      - type: PackInputs
        keys: ['img']

val_dataloader:
  batch_size: 128
  num_workers: 4
  dataset:
    type: StandardClassificationDataset
    data_root: datasets/classfication/MIDOG
    ann_file: standardized/mido_cls_val.json
    pipeline:
      - type: LoadImageFromFile
      - type: Resize
        size: [224, 224]
      - type: Normalize
        mean: [0.0, 0.0, 0.0]
        std: [255.0, 255.0, 255.0]
      - type: PackInputs
        keys: ['img']

val_evaluator:
  metrics:
    - type: Accuracy
    - type: F1_Score
    - type: Precision
    - type: Recall
  plotters:
    - type: ROCPlotter
    - type: ConfusionMatrixPlotter

optim_wrapper:
  optimizer:
    type: AdamW
    lr: 0.001
    weight_decay: 0.05

param_scheduler:
  - type: LinearLR
    start_factor: 0.001
    by_epoch: false
    begin: 0
    end: 100
  - type: MultiStepLR
    by_epoch: true
    milestones: [40, 80]
    gamma: 0.1
    begin: 0
    end: 100

runner:
  max_epochs: 100

default_hooks:
  checkpoint_hook:
    type: CheckpointHook
    interval: 10
    save_best: 'accuracy'
    rule: 'greater'

custom_hooks:
  plotter_hook:
    type: TrainingProgressPlotterHook

env:
  cudnn_benchmark: true
  device: cuda
