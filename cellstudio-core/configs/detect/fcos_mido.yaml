_base_:
  - ../_base_/default_runtime.yaml

img_size: [1024, 1024]

task:
  type: ObjectDetectionTask

model:
  type: MMDetAdapter
  config_file: configs/detect/mmdet_configs/fcos_r50-caffe_fpn_gn-head_1x_coco.py
  pretrained: configs/detect/mmdet_configs/fcos_r50_caffe_fpn_gn-head_1x_coco-821213aa.pth
  num_classes: 2

train_dataloader:
  batch_size: 4
  num_workers: 2
  dataset:
    type: MIDODataset
    data_root: datasets/detection/MIDO
    ann_file: splits/train.json
    pipeline:
      - type: LoadImageFromFile
      - type: MacenkoNormalize
      - type: Resize
        size: ${img_size}
      - type: RandomFlip
        prob: 0.5
        direction: 'horizontal'
      - type: RandomFlip
        prob: 0.5
        direction: 'vertical'
      - type: ColorJitter
        brightness: 0.2
        contrast: 0.2
      - type: Normalize
        mean: [122.7717, 115.9465, 102.9801] # Caffe BGR mean in RGB order
        std: [1.0, 1.0, 1.0]
      - type: PackInputs
        keys: ['img']

val_dataloader:
  batch_size: 4
  num_workers: 2
  dataset:
    type: MIDODataset
    data_root: datasets/detection/MIDO
    ann_file: splits/val.json
    pipeline:
      - type: LoadImageFromFile
      - type: MacenkoNormalize
      - type: Resize
        size: ${img_size}
      - type: Normalize
        mean: [122.7717, 115.9465, 102.9801]
        std: [1.0, 1.0, 1.0]
      - type: PackInputs
        keys: ['img']

val_evaluator:
  metrics:
    - type: det_map50
      iou_thresh: 0.5

optim_wrapper:
  optimizer:
    type: AdamW
    lr: 0.001
    weight_decay: 0.05

param_scheduler:
  - type: LinearLR
    start_factor: 0.001
    by_epoch: false
    begin: 0
    end: 500
  - type: MultiStepLR
    by_epoch: true
    milestones: [40, 80]
    gamma: 0.1
    begin: 0
    end: 100

runner:
  max_epochs: 100

env:
  cudnn_benchmark: true
  device: cuda
