task: detection

env:
  device: cuda
  seed: 42

data:
  dataset_name: coco128_dummy
  data_dir: ./data/dummy_yolo
  batch_size: 4
  num_workers: 2

model:
  backend: yolo
  architecture: yolov8n
  pretrained: true
  pretrained_weights: ""

training:
  epochs: 1
  learning_rate: 0.01
  optimizer: AdamW
  save_dir: ./runs
