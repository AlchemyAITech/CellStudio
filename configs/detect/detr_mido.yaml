_base_:
  - ../_base_/default_runtime.yaml

img_size: [1024, 1024]

task:
  type: ObjectDetectionTask

model:
  type: MMDetAdapter
  config_file: configs/detect/mmdet_configs/detr_r50_8xb2-150e_coco.py
  pretrained: configs/detect/mmdet_configs/detr_r50_8xb2-150e_coco_20221023_153551-436d03e8.pth
  num_classes: 2

train_dataloader:
  batch_size: 2
  num_workers: 2
  dataset:
    type: MIDODataset
    data_root: datasets/detection/MIDO
    ann_file: splits/train.json
    pipeline:
      - type: LoadImageFromFile
      - type: MacenkoNormalize
      - type: Resize
        size: ${img_size}
      - type: RandomFlip
        prob: 0.5
        direction: 'horizontal'
      - type: RandomFlip
        prob: 0.5
        direction: 'vertical'
      - type: ColorJitter
        brightness: 0.2
        contrast: 0.2
      - type: Normalize
        mean: [123.675, 116.28, 103.53]
        std: [58.395, 57.12, 57.375]
      - type: PackInputs
        keys: ['img']

val_dataloader:
  batch_size: 2
  num_workers: 2
  dataset:
    type: MIDODataset
    data_root: datasets/detection/MIDO
    ann_file: splits/val.json
    pipeline:
      - type: LoadImageFromFile
      - type: MacenkoNormalize
      - type: Resize
        size: ${img_size}
      - type: Normalize
        mean: [123.675, 116.28, 103.53]
        std: [58.395, 57.12, 57.375]
      - type: PackInputs
        keys: ['img']

val_evaluator:
  metrics:
    - type: det_map50
      iou_thresh: 0.5

optim_wrapper:
  optimizer:
    type: AdamW
    lr: 0.0001
    weight_decay: 0.0001

param_scheduler:
  - type: LinearLR
    start_factor: 0.001
    by_epoch: false
    begin: 0
    end: 200
  - type: MultiStepLR
    by_epoch: true
    milestones: [70, 90]
    gamma: 0.1
    begin: 0
    end: 100

runner:
  max_epochs: 100

env:
  cudnn_benchmark: true
  device: cuda
